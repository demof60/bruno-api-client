info:
  name: Fetch Ban Result
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/superadmin/ban/blogs/result?limit=10&offset=0&date=&type=banned"
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: date
      value: ""
      type: query
    - name: type
      value: banned
      type: query
      description: '["banned", "unbanned"]'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
