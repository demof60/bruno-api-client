info:
  name: Emails Queue
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/v2/admin/warmup?limit=1&offset=0$search=&mailType=client"
  params:
    - name: limit
      value: "1"
      type: query
    - name: offset
      value: 0$search=
      type: query
    - name: mailType
      value: client
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
