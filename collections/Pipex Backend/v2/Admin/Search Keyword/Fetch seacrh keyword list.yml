info:
  name: Fetch seacrh keyword list
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/v2/admin/searchkeyword/list/flanges?limit=100&offset"
  params:
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: ""
      type: query
    - name: search
      value: "6"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
