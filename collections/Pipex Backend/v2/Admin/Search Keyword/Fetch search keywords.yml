info:
  name: Fetch search keywords
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/admin/searchkeyword?search=&filter=all&limit=10&offset=0"
  params:
    - name: search
      value: ""
      type: query
    - name: filter
      value: all
      type: query
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
