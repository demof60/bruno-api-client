info:
  name: Get Main Stash Folders
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/api/v2/admin/folder/bin?offset=0&limit=10"
  params:
    - name: offset
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: searchQuery
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
