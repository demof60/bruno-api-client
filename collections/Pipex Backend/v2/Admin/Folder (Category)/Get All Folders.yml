info:
  name: Get All Folders
  type: http
  seq: 6

http:
  method: GET
  url: "{{url}}/api/v2/admin/folder?limit=16&offset=0&searchQuery=&status=active&type=all"
  params:
    - name: limit
      value: "16"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: searchQuery
      value: ""
      type: query
    - name: status
      value: active
      type: query
      description: "[all, pending, active, ban]"
    - name: type
      value: all
      type: query
      description: "[main, all]"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
