info:
  name: Reschedule all mails
  type: http
  seq: 8

http:
  method: PUT
  url: "{{url}}/api/v2/admin/email/reschedule/all?pending=true"
  params:
    - name: startLast
      value: "false"
      type: query
      disabled: true
    - name: pending
      value: "true"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
