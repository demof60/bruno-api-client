info:
  name: Get Bin Rfq
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/api/v2/admin/rfq/bin?offset=0&limit=10&type=all&rfqType=all"
  params:
    - name: offset
      value: "0"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: type
      value: all
      type: query
      description: "[all, lastSixty, lastThirty, lastWeek]"
    - name: rfqType
      value: all
      type: query
      description: "[all, unassigned, direct, assigned, completed]"
    - name: searchTerm
      value: Adolf555
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
