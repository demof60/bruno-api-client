info:
  name: Get All Plans
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/api/v2/admin/plan/package/get?searchTerm=Yash Aaj Protien Khalas?&limit=15&offset=0&type=all"
  params:
    - name: searchTerm
      value: Yash Aaj Protien Khalas?
      type: query
    - name: limit
      value: "15"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: type
      value: all
      type: query
    - name: packageType
      value: ""
      type: query
      disabled: true
    - name: sort
      value: ""
      type: query
      disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
