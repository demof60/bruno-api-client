info:
  name: Fetch Clients For Dropdown
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/admin/client/profile/dropdown?offset=0&search=test&limit=25&isSearchByCategory=true"
  params:
    - name: offset
      value: "0"
      type: query
    - name: search
      value: test
      type: query
    - name: limit
      value: "25"
      type: query
    - name: isSearchByCategory
      value: "true"
      type: query
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

