info:
  name: Get Subscription Orders
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/admin/payment/subscription?search=dadesefy@fxzig.com&status=active&limit=100&offset=0"
  params:
    - name: search
      value: dadesefy@fxzig.com
      type: query
    - name: status
      value: active
      type: query
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: reqForCancel
      value: "true"
      type: query
      disabled: true
    - name: search
      value: Shaikh
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
