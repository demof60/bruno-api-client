info:
  name: fetch buyers
  type: http
  seq: 4

http:
  method: GET
  url: "{{url}}/api/v2/admin/buyer/get?limit=25&offset=0&search=&type=all&status=unverified"
  params:
    - name: limit
      value: "25"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: search
      value: ""
      type: query
    - name: type
      value: all
      type: query
      description: "[all, buyer, buyer_seller , deleted ]"
    - name: status
      value: unverified
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
