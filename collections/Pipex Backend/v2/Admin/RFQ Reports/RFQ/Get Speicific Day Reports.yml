info:
  name: Get Speicific Day Reports
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/admin/report/get/speicific?limit=100&offset=0&date=24 Nov 2025"
  params:
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: date
      value: 24 Nov 2025
      type: query
    - name: type
      value: dealDone
      type: query
      description: assigned, unassigned, direct, completed, waiting_for_approval,closed,rejected,dealDone
      disabled: true
    - name: searchTerm
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
