info:
  name: Get Client Bin Products
  type: http
  seq: 8

http:
  method: GET
  url: "{{url}}/api/v2/client/product/bin?limit=10&offset=0&status=all&search=cl"
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: status
      value: all
      type: query
    - name: search
      value: cl
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
