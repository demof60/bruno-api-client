info:
  name: Add Product
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/v2/client/product/add"
  body:
    type: text
    data: "{\r

      \  \"productTitle\": \"Eco Friendly Canvas Tote Bag\",\r

      \  \"bannerImages\": [\r

      \    \"https://example.com/image1.jpg\",\r

      \    \"https://example.com/image2.jpg\"\r

      \  ]\r

      }\r\n"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
