info:
  name: Get All RFQ
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/client/rfq?limit=10&offset=0"
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: type
      value: user
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
