info:
  name: Get Reports
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/client/report?limit=10&offset=0&type=all"
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: type
      value: all
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
