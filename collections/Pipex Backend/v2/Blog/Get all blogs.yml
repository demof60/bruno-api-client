info:
  name: Get all blogs
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v2/blog?limit=10&offset=0&type=all&searchQuery="
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: type
      value: all
      type: query
    - name: searchQuery
      value: ""
      type: query
  body:
    type: multipart-form
    data:
      - name: data
        type: text
        value: |-
          { 
          "primaryTitle": "Hello World",
          "secondaryTitle": "Hello World 2",
          "date": "24/01/2025",
          "body":"sdfa sdf asdfasdf asdf asdfasf asd f fsa as fa fasd fasd fas fas d",
          "folderId": "",
          "head": {}
          }
      - name: coverImg
        type: file
        value:
          - /C:/Users/admin/Documents/7.png
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
