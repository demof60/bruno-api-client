info:
  name: Verify OTP
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/api/v2/buyer/auth/verifyOtp"
  body:
    type: json
    data: "{\r\n    \"otp\": \"741825\"\r\n}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "const response = res.getBody();\r

        bru.setEnvVar(\"token\",response.token);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
