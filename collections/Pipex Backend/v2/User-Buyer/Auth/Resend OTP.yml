info:
  name: Resend OTP
  type: http
  seq: 3

http:
  method: POST
  url: "{{url}}/api/v2/buyer/auth/resendOtp"
  body:
    type: json
    data: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "const response = res.getBody();\r

        bru.setEnvVar(\"token\",response.token);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
