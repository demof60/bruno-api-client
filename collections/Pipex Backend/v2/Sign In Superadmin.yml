runtime:
  scripts:
    - type: after-response
      code: "test(\"Response status code is 502\", function () {\r

        \    expect(res.getStatus()).to.equal(502);\r

        });\r

        \r

        test(\"Response content type is 'text/html'\", function () {\r

        \    expect(res.getHeader('Content-Type')).to.eql('text/html');\r

        });\r

        \r

        test(\"Response time is less than 200ms\", function () {\r

        \    expect(res.getResponseTime()).to.be.below(200);\r

        });\r

        \r

        test(\"Response body contains an error message\", function () {\r

        \    const responseData = JSON.stringify(res.getBody());\r

        \    \r

        \    expect(responseData).to.include(\"error\");\r

        });\r

        \r

        test(\"Response body follows the expected error schema\", function () {\r

        \    const responseData = JSON.stringify(res.getBody()); // Changed from json() to text()\r

        \r

        \    expect(responseData).to.be.a('string'); // Check if the response is a string\r

        \    expect(responseData).to.include(\"error\"); // Check for the presence of \"error\"\r

        });"

