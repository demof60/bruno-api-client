info:
  name: Fetch Sector Slots
  type: http
  seq: 2

http:
  method: GET
  url: "{{url}}/api/v1/web/home/sectors?productLimit=2"
  params:
    - name: productLimit
      value: "2"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
