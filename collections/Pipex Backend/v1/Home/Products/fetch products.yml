info:
  name: fetch products
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/v1/web/products?limit=20&offset=10"
  params:
    - name: limit
      value: "20"
      type: query
    - name: offset
      value: "10"
      type: query
  body:
    type: json
    data: "{\r

      \    \"filters\":{\r

      \        \"search\": \"\",\r

      \        \"Category\": [\"Valves\"],\r

      \        \"sector\": []\r

      \    }\r

      }"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
