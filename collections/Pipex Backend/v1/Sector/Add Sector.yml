info:
  name: Add Sector
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/api/v1/sectors"
  body:
    type: multipart-form
    data:
      - name: sector
        type: text
        value: Mechanical and Plant engineering
      - name: bannerImage
        type: file
        value:
          - /C:/Users/admin/Desktop/New folder/Compressed/stainless-steel-304-stub-end.jpg
      - name: rank
        type: text
        value: "8"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
