info:
  name: Logout
  type: http
  seq: 12

http:
  method: POST
  url: http://localhost:5000/api/v1/userlogout
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: "const response = res.getBody();\r

        bru.setEnvVar(\"token\",response.token);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
