info:
  name: Category Get All
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/api/v1/user/categoryGet?limit=10"
  params:
    - name: limit
      value: "10"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
