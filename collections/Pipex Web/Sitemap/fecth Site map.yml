info:
  name: fecth Site map
  type: http
  seq: 1

http:
  method: GET
  url: "{{webUrl}}/api/v1/sitemap?type=categories"
  params:
    - name: type
      value: categories
      type: query
    - name: limit
      value: "10"
      type: query
      disabled: true
    - name: offset
      value: "0"
      type: query
      disabled: true
    - name: search
      value: ""
      type: query
      description: quick-links', 'sub-products', 'products', 'blogs'
      disabled: true
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
