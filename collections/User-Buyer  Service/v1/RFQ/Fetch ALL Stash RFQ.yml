info:
  name: Fetch ALL Stash RFQ
  type: http
  seq: 9

http:
  method: GET
  url: "{{userUrl}}/api/v1/rfq/stash/all?offset=0&limit=100"
  params:
    - name: offset
      value: "0"
      type: query
    - name: limit
      value: "100"
      type: query
  body:
    type: multipart-form
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
