runtime:
  scripts:
    - type: after-response
      code: "const response = res.getBody();\r

        // pm.environment.set(\"token\",response.token);\r

        \r

        //Define token mappings\r

        const tokenKeys = {\r

        \    SELLER_TOKEN: \"sellerToken\",\r

        \    BUYER_TOKEN: \"buyerToken\",\r

        \    BUYER_SELLER_TOKEN: \"buyerSellerToken\"\r

        };\r

        \r

        // Iterate over tokenKeys and set them if they exist in the response\r

        Object.entries(tokenKeys).forEach(([envKey, responseKey]) => {\r

        \    if (response?.data?.[responseKey] || response?.[responseKey]) {\r

        \        console.log(\"Extracted Token:\",envKey, response?.data?.[responseKey]);\r

        \        bru.setEnvVar(\"token\", response.data?.[responseKey] || response[responseKey]);\r

        \    }\r

        });\r

        var template = `\r

        <style type=\"text/css\">\r

        \    .tftable {font-size:14px;color:#333333;width:100%;border-width: 1px;border-color: #87ceeb;border-collapse: collapse;}\r

        \    .tftable th {font-size:18px;background-color:#87ceeb;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;text-align:left;}\r

        \    .tftable tr {background-color:#ffffff;}\r

        \    .tftable td {font-size:14px;border-width: 1px;padding: 8px;border-style: solid;border-color: #87ceeb;}\r

        \    .tftable tr:hover {background-color:#e0ffff;}\r

        </style>\r

        \r

        <table class=\"tftable\" border=\"1\">\r

        \    <tr>\r

        \        <th>Token</th>\r

        \        <th>Username</th>\r

        \        <th>Email</th>\r

        \        <th>Role</th>\r

        \        <th>Is OTP Verified</th>\r

        \    </tr>\r

        \    <tr>\r

        \        <td>{{response.data.token}}</td>\r

        \        <td>{{response.data.userDetails.username}}</td>\r

        \        <td>{{response.data.userDetails.email}}</td>\r

        \        <td>{{response.data.userDetails.role}}</td>\r

        \        <td>{{response.data.userDetails.isOtpVerified}}</td>\r

        \    </tr>\r

        </table>\r

        `;\r

        \r

        function constructVisualizerPayload() {\r

        \    return {response: res.getBody()};\r

        }\r

        \r

        bru.visualize(\"html\", {\r

        \    template: template,\r

        \    data: constructVisualizerPayload()\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
