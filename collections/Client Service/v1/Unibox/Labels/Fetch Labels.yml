info:
  name: Fetch Labels
  type: http
  seq: 1

http:
  method: GET
  url: "{{clientUrl}}/api/v1/unibox/label?limit=10&offset=0&search="
  params:
    - name: limit
      value: "10"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: search
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
