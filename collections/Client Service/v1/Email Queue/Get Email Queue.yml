info:
  name: Get Email Queue
  type: http
  seq: 1

http:
  method: GET
  url: "{{clientUrl}}/api/v1/email-queue?type=billing&limit=50&offset=0"
  params:
    - name: type
      value: billing
      type: query
    - name: limit
      value: "50"
      type: query
    - name: status
      value: active
      type: query
      disabled: true
    - name: searchTerm
      value: "137"
      type: query
      disabled: true
    - name: isDeleted
      value: "false"
      type: query
      disabled: true
    - name: offset
      value: "0"
      type: query
  body:
    type: text
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
