info:
  name: Create Product Draft
  type: http
  seq: 2

http:
  method: POST
  url: "{{clientUrl}}/api/v1/product/draft/create"
  body:
    type: multipart-form
    data:
      - name: productTitle
        type: text
        value: "{{randomProductTitle}}"
      - name: url
        type: text
        value: "{{randomProductTitle}}"
      - name: productDescriptionHeading
        type: text
        value: "{{randomProductTitle}}"
      - name: folderId
        type: text
        value: 699ea5bf0fef61ba95631872
        disabled: true
      - name: priceRangeFrom
        type: text
        value: "100"
        disabled: true
      - name: minPrice
        type: text
        value: "121"
        disabled: true
      - name: priceRangeTo
        type: text
        value: "300"
        disabled: true
      - name: maxPrice
        type: text
        value: "300"
        disabled: true
      - name: minOrder
        type: text
        value: "1"
        disabled: true
      - name: minOrderUnit
        type: text
        value: unit
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: before-request
      code: "// Sequential title: Product_a, Product_aa, Product_aaa, ...\r

        let count = parseInt(bru.getCollectionVar(\"productTitleCounter\") || \"0\");\r

        count = count + 1;\r

        pm.collectionVariables.set(\"productTitleCounter\", count.toString());\r

        \r

        const suffix = \"a\".repeat(count);\r

        const productTitle = \"Product_\" + suffix;\r

        pm.collectionVariables.set(\"randomProductTitle\", productTitle);\r

        \r

        // const randomTitle = \"Product_\" + Math.random().toString(36).substring(2, 10) +\r

