info:
  name: Get Transaction History
  type: http
  seq: 15

http:
  method: GET
  url: "{{clientUrl}}/api/v1/profile/transactionhistory?limit=100&offset=0"
  params:
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: searchTerm
      value: gold
      type: query
      disabled: true
  body:
    type: multipart-form
    data:
      - name: limit
        type: text
        value: "100"
      - name: offset
        type: text
        value: "10"
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
