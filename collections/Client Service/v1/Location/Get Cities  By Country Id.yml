info:
  name: Get Cities  By Country Id
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:9000/api/v1/location/dropdown?limit=1000&offset=0&type=country
  params:
    - name: limit
      value: "1000"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: type
      value: country
      type: query
    - name: search
      value: new york
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
