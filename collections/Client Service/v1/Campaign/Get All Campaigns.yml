info:
  name: Get All Campaigns
  type: http
  seq: 3

http:
  method: GET
  url: "{{clientUrl}}/api/v1/campaign?limit=25&offset=0&status=all"
  params:
    - name: limit
      value: "25"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: searchTerm
      value: w
      type: query
      disabled: true
    - name: status
      value: all
      type: query
      description: all, active, pause, draft, complete
  body:
    type: json
    data: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
