info:
  name: Get Industries For Dropdown
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:9000/api/v1/industry/dropdown?limit=100&offset=0
  params:
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
    - name: search
      value: Tradingnmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmmm
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
