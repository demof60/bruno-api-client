info:
  name: Quotation Bulk Import
  type: http
  seq: 4

http:
  method: PUT
  url: "{{clientUrl}}/api/v1/quotation/excel-upload"
  body:
    type: multipart-form
    data:
      - name: billing
        type: file
        value:
          - /C:/Users/admin/Desktop/Vin/quotation.csv
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
