info:
  name: Bulk Upload Lead (excel)
  type: http
  seq: 3

http:
  method: POST
  url: "{{clientUrl}}/api/v1/lead/bulk/excel-upload"
  body:
    type: multipart-form
    data:
      - name: lead
        type: file
        value:
          - /C:/Users/admin/Desktop/Trash/our lead.xlsx
      - name: listId
        type: text
        value: /
        disabled: true
      - name: allowAll
        type: text
        value: "true"
        disabled: true
      - name: removeFromOtherList
        type: text
        value: "true"
        disabled: true
      - name: dontAdd
        type: text
        value: "true"
        disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
