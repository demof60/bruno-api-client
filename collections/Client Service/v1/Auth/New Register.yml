info:
  name: New Register
  type: http
  seq: 3

http:
  method: POST
  url: "{{clientUrl}}/api/v1/auth/registration?captcha=01"
  params:
    - name: captcha
      value: "01"
      type: query
  body:
    type: json
    data: |-
      {
        "username": "{{$randomUserName}}",
        "email": "{{$randomEmail}}",
        "pinCode": "400060",
        "city": "Mumbai",
        "country": "India",
        "number": "{{$randomPhoneNumber}}",
        "companyName": "{{$randomCompanyName}}",
        "password": "Pipex@F70",
        "firstName": "{{$randomFirstName}}",
        "lastName": "{{$randomLastName}}",
        "address": "{{$randomStreetAddress}}",
        "region": {
          "isoCode": "IN",
          "name": "India",
          "dialCode": "+91"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
