        };\r

        \r

        // Iterate over tokenKeys and set them if they exist in the response\r

        Object.entries(tokenKeys).forEach(([envKey, responseKey]) => {\r

        \    if (response?.data?.[responseKey] || response?.[responseKey]) {\r

        \        console.log(\"Extracted Token:\",envKey, response?.data?.[responseKey]);\r

